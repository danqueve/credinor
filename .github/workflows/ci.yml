name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: credinor_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Lint PHP
        run: find src public cron -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" | head -20

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install npm dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Run PHPUnit (unit tests)
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: credinor_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/phpunit --testdox
